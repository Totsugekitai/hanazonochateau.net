[[voices]]
title = "チェンバロ"
category = "piano etc."
param = """
@20 0 1
;AR DR SR RR SL TL KSL KSR ML WS AM VIB --- チェンバロ
 15 10 00 01 02 19   0   0 05  6  0   0
 14 00 04 04 00 00   0   0 01  6  0   0
; slot1 の ML=3,7 などでもよい
"""
comment = "WSを両方6にするのは結構色んな音が出るので研究する価値があるかもしれない。\nサンプル音声は BWV 1087 の 6 です。"
audio = "VOICE1/CHENBARO.MP3"

